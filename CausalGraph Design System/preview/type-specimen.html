<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type · Specimen in context</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--cg-font-sans); background:
    radial-gradient(circle at 14% 8%, rgba(15,23,42,.10), transparent 30%),
    radial-gradient(circle at 88% 6%, rgba(15,23,42,.08), transparent 26%),
    linear-gradient(180deg,#fff 0%, #f7f8fa 42%, #eef2f7 100%);
    background-image:
      radial-gradient(circle at 14% 8%, rgba(15,23,42,.10), transparent 30%),
      radial-gradient(circle at 88% 6%, rgba(15,23,42,.08), transparent 26%),
      linear-gradient(rgba(15,23,42,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,23,42,0.05) 1px, transparent 1px),
      linear-gradient(180deg,#fff 0%, #f7f8fa 42%, #eef2f7 100%);
    background-size: auto, auto, 24px 24px, 24px 24px, auto;
    color: var(--cg-ink); padding: 24px 28px; }
  .eyebrow { display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: var(--cg-ink-soft); background: rgba(255,255,255,0.72); border: 1px solid var(--cg-border-strong); border-radius: 9999px; }
  h1 { font-family: var(--cg-font-display); font-size: 36px; font-weight: 600; letter-spacing: -0.03em; color: var(--cg-ink-strong); line-height: 1.05; margin: 12px 0 10px; max-width: 640px; }
  p { font-family: var(--cg-font-sans); font-size: 15px; line-height: 1.55; color: var(--cg-ink-muted); margin: 0; max-width: 540px; }
</style>
</head>
<body>
  <span class="eyebrow">Evidence infrastructure for ESG research</span>
  <h1>Read disclosures as connected evidence, not isolated PDFs.</h1>
  <p>CausalGraph gives analysts a controlled workspace for report search, scenario reasoning, and graph-based review of climate, governance, and operating-risk disclosures.</p>
</body>
</html>
