<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Components · Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--cg-font-sans); background:#fff; color: var(--cg-ink); padding: 18px 22px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .label { font-family: var(--cg-font-display); font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
  .note { font-family: var(--cg-font-mono); font-size: 11px; color: var(--cg-ink-soft); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: grid; gap: 4px; }
  .lab { font-size: 12px; font-weight: 500; color: var(--cg-ink-muted); }
  .input { width: 100%; box-sizing: border-box; border: 1px solid var(--cg-border); background:#fff; border-radius: 8px; padding: 9px 12px; font-size: 14px; font-family: inherit; color: var(--cg-ink); outline: none; }
  .input:focus { border-color: #94a3b8; box-shadow: 0 0 0 3px rgba(15,23,42,.08); }
  .input.disabled { background: #f1f5f9; color: var(--cg-ink-soft); cursor: not-allowed; }
  .input.error { border-color: #fecaca; }
  .err-msg { font-family: var(--cg-font-sans); font-size: 11.5px; color:#b91c1c; }
  .search { position: relative; }
  .search i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--cg-ink-soft); width: 14px; height: 14px; }
  .search .input { padding-left: 34px; }
  .toggle { width: 34px; height: 20px; border-radius: 999px; background: var(--cg-slate-300); position: relative; }
  .toggle.on { background: #0f172a; }
  .toggle::after { content:""; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:999px; background:#fff; transition: all .15s; }
  .toggle.on::after { left: 16px; }
</style>
</head>
<body>
  <div class="head"><div class="label">Form inputs</div><div class="note">8px radius · slate-200 borders · slate ring on focus</div></div>
  <div class="grid">
    <div class="field"><div class="lab">Email</div><input class="input" placeholder="you@example.com" /></div>
    <div class="field"><div class="lab">Password</div><input class="input" type="password" value="••••••••" /></div>
    <div class="field search"><div class="lab">Search reports</div><i data-lucide="search"></i><input class="input" placeholder="Search by company, metric, or evidence" /></div>
    <div class="field"><div class="lab">Domain</div><input class="input disabled" value="general" disabled /></div>
    <div class="field"><div class="lab">File too large</div><input class="input error" value="64.2MB" /><div class="err-msg">[ERROR] Maximum size is 50MB.</div></div>
    <div class="field"><div class="lab" style="display:flex;justify-content:space-between;align-items:center">Auto-sync to Neo4j <span class="toggle on"></span></div><div style="font-size:11.5px;color:var(--cg-ink-soft)">Push entities to the graph database when indexing</div></div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
