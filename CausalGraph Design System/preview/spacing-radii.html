<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing · Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--cg-font-sans); background: #fff; color: var(--cg-ink); padding: 18px 22px; }
  .head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  .label { font-family: var(--cg-font-display); font-size: 14px; font-weight: 600; letter-spacing: -0.02em; }
  .note { font-family: var(--cg-font-mono); font-size: 11px; color: var(--cg-ink-soft); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .cell { display: grid; gap: 6px; justify-items: center; }
  .tile { width: 64px; height: 56px; background: var(--cg-slate-100); border: 1px solid var(--cg-border); }
  .name { font-family: var(--cg-font-mono); font-size: 10.5px; color: var(--cg-ink); font-weight: 600; }
  .meta { font-family: var(--cg-font-mono); font-size: 10px; color: var(--cg-ink-soft); }
</style>
</head>
<body>
  <div class="head"><div class="label">Radii</div><div class="note">14px is the default · 9999px reserved for chips/toggles</div></div>
  <div class="row">
    <div class="cell"><div class="tile" style="border-radius:6px"></div><div class="name">xs · 6px</div><div class="meta">tags, inputs</div></div>
    <div class="cell"><div class="tile" style="border-radius:8px"></div><div class="name">sm · 8px</div><div class="meta">nav items</div></div>
    <div class="cell"><div class="tile" style="border-radius:12px"></div><div class="name">md · 12px</div><div class="meta">buttons</div></div>
    <div class="cell"><div class="tile" style="border-radius:14px"></div><div class="name">lg · 14px</div><div class="meta">panels (default)</div></div>
    <div class="cell"><div class="tile" style="border-radius:20px"></div><div class="name">xl · 20px</div><div class="meta">message bubbles</div></div>
    <div class="cell"><div class="tile" style="border-radius:9999px;width:96px"></div><div class="name">pill</div><div class="meta">chips · toggles</div></div>
  </div>
</body>
</html>
