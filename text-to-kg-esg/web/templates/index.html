<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESG Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="sidebar">
        <h2>ESG Knowledge Graph</h2>

        <div class="filter-group view-toggle">
            <h3>View Mode</h3>
            <div class="toggle-buttons">
                <button id="view-summary" class="btn toggle-btn active">Summary (4 Clusters)</button>
                <button id="view-detail" class="btn toggle-btn">Detail (Full KG)</button>
            </div>
        </div>

        <div class="filter-group">
            <h3>ESG Domain</h3>
            <div id="domain-filters"></div>
        </div>

        <div class="filter-group">
            <h3>Company</h3>
            <div id="company-filters"></div>
        </div>

        <div class="filter-group">
            <h3>Year</h3>
            <div id="year-filters"></div>
        </div>

        <div class="filter-group detail-only">
            <h3>Node Limit</h3>
            <input type="range" id="node-limit" min="50" max="2000" value="300" step="1">
            <span id="limit-value">300</span>
            <button id="show-all-btn" class="btn-small">Show All</button>
        </div>

        <button id="apply-btn" class="btn">Apply Filters</button>

        <div id="stats" class="stats-panel"></div>

        <div id="gw-panel" class="stats-panel"></div>

        <div id="drill-panel" class="stats-panel" style="display:none">
            <h3>Drill Down</h3>
            <p id="drill-info">Click a cluster node to explore its concepts</p>
            <button id="back-to-summary" class="btn-small" style="display:none; background:#3b82f6; color:white; padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-size:14px; font-weight:bold;">← Back</button>
        </div>

        <div class="legend">
            <h3>Edge Legend</h3>
            <div class="legend-item"><span class="legend-line solid thick"></span> High credibility (&ge;3/5)</div>
            <div class="legend-item"><span class="legend-line solid thin"></span> Medium (1-3/5)</div>
            <div class="legend-item"><span class="legend-line dashed thin"></span> Low (&lt;1/5)</div>
            <div class="legend-item"><span class="legend-arrow">&rarr;</span> Directed</div>
            <div class="legend-item"><span class="legend-arrow">&harr;</span> Bidirectional</div>
        </div>
    </div>

    <div class="main">
        <div id="year-timeline" style="position:absolute; top:16px; left:50%; transform:translateX(-50%); z-index:100;
            background:transparent; padding:12px 24px;">
            <!-- Timeline track populated by JS -->
        </div>
        <svg id="graph"></svg>
        <button id="back-to-summary-float" onclick="_navBack()"
            style="display:none; position:absolute; top:16px; left:16px; z-index:100;
            background:#3b82f6; color:white; padding:10px 20px; border:none; border-radius:8px;
            cursor:pointer; font-size:14px; font-weight:bold; box-shadow:0 2px 8px rgba(0,0,0,0.2);">
            ← Back
        </button>
        <div id="tooltip" class="tooltip"></div>
    </div>

    <script src="/static/js/graph.js"></script>
</body>
</html>
