app = "casualgraph"
primary_region = "syd"

[build]

[env]
  PORT = "8000"
  AUTH_DB_PATH = "/data/auth.db"
  EXTRACTION_MAX_WORKERS = "4"
  INGESTION_JOB_MAX_WORKERS = "1"

[mounts]
  source = "casualgraph_data"
  destination = "/data"
  initial_size = "3gb"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
